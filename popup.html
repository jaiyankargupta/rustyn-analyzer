<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rustyn Analyzer Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="settings-container">
    <header class="settings-header">
      <h1>Rustyn Analyzer</h1>
    </header>

    <main class="settings-form">
      <div class="form-group">
        <label for="api-key">Groq API Key</label>
        <div class="input-wrapper">
          <input type="password" id="api-key" placeholder="gsk_..." autocomplete="off" readonly>
          <button id="edit-btn" class="edit-btn" title="Edit API Key">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="model-select">AI Model</label>
        <select id="model-select">
          <option value="llama-3.1-8b-instant" selected>Llama 3.1 8B Instant (Recommended)</option>
          <option value="llama3-8b-8192">Llama 3 8B 8192</option>
          <option value="llama-3.1-70b-versatile">Llama 3.1 70B Versatile</option>
        </select>
      </div>

      <div class="form-actions">
        <button id="save-btn" class="btn-primary">Save Settings</button>
        <button id="test-btn" class="btn-secondary">Test Connection</button>
      </div>

      <div id="status-message" class="status-message hidden"></div>
    </main>

    <footer class="settings-footer">
      <div class="footer-links">
        <a href="https://github.com/jaiyankargupta/" target="_blank" class="footer-link">
          <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.53 1.032 1.53 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" />
          </svg>
          GitHub
        </a>
        <a href="https://github.com/sponsors/jaiyankargupta" target="_blank" class="footer-link">
          <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
          Sponsor
        </a>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>

</html>
